<!DOCTYPE html>
<html>
<head>
<style>
.flex-col { display: flex; flex-direction: column; height: 100px; border: 1px solid black; }
</style>
</head>
<body>
<div style="display: grid; grid-template-columns: 1fr 1fr 1fr; width: 2800px; height: 150px;">
    <div id="sl" class="flex-col" style="justify-content: center; align-items: flex-start;"></div>
    <div id="sc" class="flex-col" style="justify-content: center; align-items: center;"></div>
    <div id="sr" class="flex-col" style="justify-content: center; align-items: flex-end;"></div>
</div>

<div id="logoCont" style="width: 100%; display: flex; justify-content: flex-end; background: yellow;">
    <img id="logo" src="https://via.placeholder.com/250" style="max-width: 250px; display: inline-block;">
</div>

<script>
    document.getElementById("sr").appendChild(document.getElementById("logoCont"));
</script>
</body>
</html>
